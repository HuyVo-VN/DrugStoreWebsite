name: Deploy to VPS

on:
  push:
    branches: [ main ] 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Connect to VPS and Deploy
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          # Bật chế độ: Bất kỳ lệnh nào lỗi thì DỪNG CẢ KỊCH BẢN (báo đỏ GitHub ngay)
          set -e
          
          cd ~/DrugStoreWebsite
          
          echo "=== 1. KÉO CODE MỚI NHẤT ==="
          # Lưu lại trạng thái commit CŨ trước khi pull
          git pull origin main
          
          echo "=== 2. QUÉT SỰ THAY ĐỔI ==="
          # ORIG_HEAD là cọc mốc lưu commit trước khi pull. 
          # git diff sẽ soi xem từ cọc mốc đó đến hiện tại có file nào bị đổi
          CHANGED_FILES=$(git diff --name-only ORIG_HEAD HEAD)
          echo "Danh sách file thay đổi:"
          echo "$CHANGED_FILES"

          # Chuẩn bị 1 biến trống để hứng tên các service cần xóa
          SERVICES_TO_BUILD=""

          # Dùng grep để soi xem có thay đổi ở thư mục nào thì gọi tên service đó
          if echo "$CHANGED_FILES" | grep -q "DrugStoreWebsiteFE/"; then
            echo "-> Phát hiện sửa Frontend"
            SERVICES_TO_BUILD="$SERVICES_TO_BUILD frontend"
            sudo rm -rf ./DrugStoreWebsiteFE/.angular/cache
          fi
          
          if echo "$CHANGED_FILES" | grep -q "DrugStoreWebsiteAuthen/"; then
            echo "-> Phát hiện sửa Authen API"
            SERVICES_TO_BUILD="$SERVICES_TO_BUILD authen-api"
          fi
          
          if echo "$CHANGED_FILES" | grep -q "DrugStoreWebsiteData/"; then
            echo "-> Phát hiện sửa Data API"
            SERVICES_TO_BUILD="$SERVICES_TO_BUILD data-api"
          fi
          
          if echo "$CHANGED_FILES" | grep -q "DrugStoreWebsiteAI/"; then
            echo "-> Phát hiện sửa AI Service"
            SERVICES_TO_BUILD="$SERVICES_TO_BUILD ai-service"
          fi

          echo "=== 3. THỰC THI BUILD VÀ DEPLOY ==="
          # Trường hợp đặc biệt: Nếu sửa tận gốc file docker-compose thì build lại hết
          if echo "$CHANGED_FILES" | grep -q "docker-compose.yml"; then
            echo "Phát hiện thay đổi hạ tầng! Tiến hành cập nhật toàn bộ..."
            sudo docker-compose up -d --build
            
          # Nếu có service cần build thì chỉ build đúng bọn nó
          elif [ -n "$SERVICES_TO_BUILD" ]; then
            echo "CHỈ BUILD VÀ RESTART CÁC SERVICE: $SERVICES_TO_BUILD"
            # Lệnh này cực kỳ xịn: Nó chỉ build và thay thế các container được chỉ định. 
            # Các container khác (như Redis, MinIO) vẫn sống và phục vụ khách hàng bình thường! (Zero Downtime)
            sudo docker-compose up -d --build $SERVICES_TO_BUILD
            
          else
            echo "Không có thay đổi nào ở Code logic. Giữ nguyên hệ thống."
          fi
          
          echo "=== 4. DỌN DẸP Ổ CỨNG ==="
          # Vẫn giữ lệnh dọn rác để VPS không bị nổ ổ cứng
          sudo docker image prune -af