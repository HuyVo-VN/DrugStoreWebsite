name: Deploy to VPS

on:
  push:
    branches: [ main ] 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Connect to VPS and Deploy
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          # Bật chế độ: Bất kỳ lệnh nào lỗi thì DỪNG CẢ KỊCH BẢN (báo đỏ GitHub ngay)
          set -e
          
          cd ~/DrugStoreWebsite
          
          # 1. ÉP KÉO CODE MỚI NHẤT (Vượt qua mọi lỗi Conflict)
          git pull origin main

          # 2. TIÊU DIỆT TÀN DƯ CỦA CACHE ANGULAR TRƯỚC KHI BUILD
          sudo rm -rf ./DrugStoreWebsiteFE/.angular/cache
          sudo docker-compose down

          # 3. BUILD MỚI 100% KHÔNG XÀI CACHE CHO TẤT CẢ SERVICES
          sudo docker-compose build --no-cache

          # 4. KHỞI ĐỘNG LẠI HỆ THỐNG TRƠN TRU
          sudo docker-compose up -d

          # 5. Dọn dẹp Image rác để VPS không bị đầy ổ cứng
          sudo docker image prune -af