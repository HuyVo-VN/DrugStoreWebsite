<div class="admin-container">
  <div class="page-header">
    <h2>Category Management</h2>
    <button class="btn btn-add" (click)="openAddModal()">
      + Add
    </button>
  </div>

  <table class="category-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Description</th>
        <th>Status</th>
        <th class="action-header">Action</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let cat of categories">
        <td class="category-name">{{ cat.name }}</td>
        <td>{{ cat.description }}</td>
        <td>
          <span [ngClass]="cat.isActive ? 'status-active' : 'status-hidden'">
            {{ cat.isActive ? 'Active' : 'Hidden' }}
          </span>
        </td>
        <td class="action-cell">
          <div class="action-group">
            <button class="btn-action btn-toggle" (click)="toggleStatus(cat)">
              <i class="fa-solid fa-power-off"></i>
              {{ cat.isActive ? 'Hide' : 'Active' }}
            </button>

            <div class="action-row-bottom">
              <button class="btn-action btn-edit" (click)="openEditModal(cat)">
                Edit
              </button>

              <button class="btn-action btn-delete" (click)="deleteCategory(cat.id)">
                Delete
              </button>
            </div>
          </div>
        </td>
      </tr>

      <tr *ngIf="categories.length === 0">
        <td colspan="4" class="empty-state">No categories yet.</td>
      </tr>
    </tbody>
  </table>

  <div class="pagination">
    <button (click)="changePage(pageNumber - 1)" [disabled]="pageNumber === 1">
      Previous
    </button>
    <span>Page {{ pageNumber }} / {{ totalPages }}</span>
    <button (click)="changePage(pageNumber + 1)" [disabled]="pageNumber === totalPages">
      Next
    </button>
  </div>

  <div *ngIf="showModal" class="modal-overlay">
    <div class="modal-box">
      <h3>{{ isEditMode ? 'Edit Category' : 'Add new Category' }}</h3>

      <div class="form-group">
        <label>Category Name *</label>
        <input type="text" [(ngModel)]="formData.name">
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea [(ngModel)]="formData.description" rows="4"></textarea>
      </div>

      <div class="modal-actions">
        <button class="btn btn-cancel" (click)="closeModal()">Cancel</button>
        <button class="btn btn-save" (click)="saveCategory()">Save</button>
      </div>
    </div>
  </div>
</div>
