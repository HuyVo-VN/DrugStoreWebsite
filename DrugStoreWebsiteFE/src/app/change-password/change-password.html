<div id="changepassword-background-container">
  <div class="changepassword-box">
    <h2 style="margin-bottom: 30px;">Change Password</h2>

    <form #changeForm="ngForm" (ngSubmit)="changePassword()">
      <div style="margin-bottom: 15px; text-align: left;">
        <label class="changepassword-label-group">Old Password</label>
        <div>
          <input type="password" [(ngModel)]="oldPassword" name="oldPassword" required class="changepassword-input"
            (input)="onOldPasswordInput($event)" />
        </div>
      </div>

      <div style="margin-bottom: 15px; text-align: left;">
        <label class="changepassword-label-group">New Password</label>
        <div>
          <input type="password" [(ngModel)]="newPassword" name="newPassword" required class="changepassword-input" />
        </div>
      </div>

      <div style="margin-bottom: 15px; text-align: left;">
        <label class="changepassword-label-group">Confirm New Password</label>
        <div>
          <input type="password" [(ngModel)]="newConfirmPassword" name="newConfirmPassword" required
            class="changepassword-input" />
        </div>
      </div>
      <div *ngIf="errorMessage" [innerHTML]="errorMessage"
        style="color: red; text-align: center; margin-bottom: 15px; font-size: 14px;">
        {{ errorMessage }}
      </div>
      <div class="changepassword-button-group">
        <button type="button" class="changepassword-button-secondary" (click)="goBack()">Back</button>
        <button type="submit" [disabled]="!changeForm.valid" class="changepassword-button-primary">Change
          Password</button>
      </div>
    </form>
  </div>
</div>
