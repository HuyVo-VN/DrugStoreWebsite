<div id="forgetpassword-background-container">
    <div class="forgetpassword-box">
        <h2 style="margin-bottom: 10px;">Forget Password</h2>
        <form #forgetForm="ngForm" (ngSubmit)="forgetPassword()">
            <div class="forgetpassword-label-group">
                <label>Enter your email to reset your password</label>
            </div>
            <input type="email" [(ngModel)]="email" name="email" required class="forgetpassword-input" />
            <div class="forgetpassword-button-group">
                <button type="button" class="forgetpassword-button-secondary" (click)="goBack()">Back</button>
                <button type="submit" [disabled]="!forgetForm.valid" class="forgetpassword-button-primary">Send</button>
            </div>
        </form>
    </div>
</div>
