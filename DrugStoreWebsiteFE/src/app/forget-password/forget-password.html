<div id="login-background-container">
  <div class="login-box" style="max-width: 450px;">

    <div style="text-align: center; margin-bottom: 25px;">
      <h2>Forgot Password?</h2>
      <p style="color: #666; font-size: 14px; margin-top: 10px;">
        No worries! Enter the email address associated with your account and we'll send you a link to reset your password.
      </p>
    </div>

    <form #forgetForm="ngForm" (submit)="onSubmit(); $event.preventDefault()">
      <div style="margin-bottom: 20px; text-align: left;">
        <label class="login-label-group">Email Address</label>
        <div>
          <input type="email" [(ngModel)]="email" name="email" required
                 class="login-input" placeholder="e.g. cuteo123@gmail.com" />
        </div>
      </div>

      <button type="submit" [disabled]="!forgetForm.valid || isLoading" class="login-button-primary">
        {{ isLoading ? 'Sending...' : 'Send Reset Link' }}
      </button>
    </form>

    <div class="login-horizontal-line" style="margin: 25px 0;"></div>

    <div style="text-align: center;">
      <a routerLink="/login" style="color: #555; text-decoration: none; font-weight: 500; cursor: pointer; transition: 0.2s;">
        <i class="fa-solid fa-arrow-left" style="margin-right: 5px;"></i> Back to Login
      </a>
    </div>

  </div>
</div>
