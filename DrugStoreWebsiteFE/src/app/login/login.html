<div id="login-background-container">
  <div class="login-box">
    <h2 style="margin-bottom: 30px;">{{ requires2FA ? 'Security Verification' : 'Login' }}</h2>

    <div *ngIf="!requires2FA">
      <form #loginForm="ngForm" (submit)="login(); $event.preventDefault()">
        <div style="margin-bottom: 15px; text-align: left;">
          <label class="login-label-group">Username</label>
          <div>
            <input [(ngModel)]="username" name="username" required class="login-input" />
          </div>
        </div>

        <div style="margin-bottom: 15px; text-align: left;">
          <label class="login-label-group">Password</label>
          <div>
            <input #passwordInput [(ngModel)]="password" type="password" name="password" required class="login-input" />
          </div>
          <p style="margin-top: 15px; color: red; text-align: center; font-size: 14px;">{{ message }}</p>
        </div>
        <button type="submit" [disabled]="!loginForm.valid" class="login-button-primary">Login</button>
      </form>

      <div class="login-forget-pass" style="margin-top: 20px;">
        <a routerLink="/forget-password">Forgot password?</a>
      </div>
      <div class="login-horizontal-line"></div>
      <button type="button" class="login-button-secondary" (click)="goToRegister()">Sign Up</button>

      <div class="social-login-container">
        <p class="social-login-text">Or login with</p>
        <div class="social-buttons">
          <div style="flex: 1; display: flex; justify-content: center;">
            <asl-google-signin-button type="standard" size="large" [width]="200"></asl-google-signin-button>
          </div>
          <button type="button" class="btn-social btn-facebook" (click)="loginWithFacebook()" style="flex: 1;">
            <i class="fab fa-facebook-f"></i> Facebook
          </button>
        </div>
      </div>
    </div>

    <div *ngIf="requires2FA" style="text-align: center;">
      <p style="font-size: 14px; margin-bottom: 20px; color: #555;">
        Please open the Google Authenticator app on your phone and enter the 6-digit code for <b>{{username}}</b>.
      </p>

      <input type="text" [(ngModel)]="otpCode" maxlength="6" placeholder="000000"
             style="width: 100%; text-align: center; font-size: 28px; letter-spacing: 10px; padding: 15px 10px; margin-bottom: 25px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box;"
             (keyup.enter)="otpCode.length === 6 ? verify2FALogin() : null" />

      <button type="button" class="login-button-primary" (click)="verify2FALogin()" [disabled]="otpCode.length !== 6">
        Verify Code
      </button>

      <button type="button" class="login-button-secondary" (click)="requires2FA = false; otpCode = ''; password = ''" style="margin-top: 15px;">
        Cancel & Back
      </button>
    </div>

  </div>
</div>
