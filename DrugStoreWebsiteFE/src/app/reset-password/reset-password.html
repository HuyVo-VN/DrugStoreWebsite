<div id="login-background-container">
  <div class="login-box" style="max-width: 450px;">

    <div style="text-align: center; margin-bottom: 25px;">
      <h2>Set New Password</h2>
      <p style="color: #666; font-size: 14px; margin-top: 10px;">
        Please enter your new password below for account:<br>
        <b>{{ email }}</b>
      </p>
    </div>

    <form #resetForm="ngForm" (submit)="onSubmit(); $event.preventDefault()">
      <div style="margin-bottom: 15px; text-align: left;">
        <label class="login-label-group">New Password</label>
        <div>
          <input type="password" [(ngModel)]="newPassword" name="newPassword" required minlength="6"
                 class="login-input" placeholder="Enter new password" />
        </div>
      </div>

      <div style="margin-bottom: 25px; text-align: left;">
        <label class="login-label-group">Confirm New Password</label>
        <div>
          <input type="password" [(ngModel)]="confirmNewPassword" name="confirmNewPassword" required minlength="6"
                 class="login-input" placeholder="Confirm new password" />
        </div>
      </div>

      <button type="submit" [disabled]="!resetForm.valid || isLoading" class="login-button-primary">
        {{ isLoading ? 'Saving...' : 'Reset Password' }}
      </button>
    </form>

  </div>
</div>
