<div id="resetpassword-background-container">
  <div class="resetpassword-box">
    <h2 style="margin-bottom: 30px;">Forget Password</h2>

    <div *ngIf="errorMessage" [innerHTML]="errorMessage"
      style="color: red; text-align: left; margin-bottom: 15px; font-size: 14px;">
      {{ errorMessage }}
    </div>

    <form #resetForm="ngForm" (ngSubmit)="resetPassword()">
      <div style="margin-bottom: 15px; text-align: left;">
        <label class="resetpassword-label-group">New Password</label>
        <div>
          <input type="password" [(ngModel)]="newPassword" name="newPassword" required class="resetpassword-input" />
        </div>
      </div>

      <div style="margin-bottom: 15px; text-align: left;">
        <label class="resetpassword-label-group">Confirm New Password</label>
        <div>
          <input type="password" [(ngModel)]="newConfirmPassword" name="newConfirmPassword" required class="resetpassword-input" />
        </div>
      </div>

      <div class="resetpassword-button-group">
        <button type="button" class="resetpassword-button-secondary" (click)="goBack()">Back</button>
        <button type="submit" [disabled]="!resetForm.valid" class="resetpassword-button-primary">Change Password</button>
      </div>
    </form>
  </div>
</div>
