<h2>User List</h2>

<table class="user-table" *ngIf="users.length > 0; else noData">
  <thead>
    <tr>
      <th>Full Name</th>
      <th>Username</th>
      <th>Email</th>
      <th>Gender</th>
      <th>Phone</th>
      <th>Role</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let user of users" [hidden]="user.id === currentUserId">
      <td>{{ user.fullName || '—' }}</td>
      <td>{{ user.userName || '—' }}</td>
      <td>{{ user.email || '—' }}</td>
      <td>{{ user.gender || '—' }}</td>
      <td>{{ user.phoneNumber || '—' }}</td>
      <td>{{ user.roles?.join(', ') || 'No role' }}</td>
      <td>
        <i (click)="assignRole(user)" class="fa-solid fa-pen-to-square"
          style="cursor: pointer; color: rgb(21, 112, 230); margin-right: 5px;"></i>
        <i (click)="delete(user)" class="fa-solid fa-xmark" style="cursor: pointer; color:red;"></i>
      </td>
    </tr>
  </tbody>
</table>
<div style="text-align: right; margin-top: 15px;margin-right: 20px;">
  <button type="button" class="user-button-secondary" (click)="goBack()">Back</button>
</div>
<ng-template #noData>
  <p style="text-align: center; color: rgb(216, 122, 33);">No users found.</p>
</ng-template>
